name: lobby
description: GuildChat — Gaming Messenger
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.4.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # ── Firebase core ─────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_database: ^11.1.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # ── Auth ──────────────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Game detection (Android) ──────────────────────────────────
  device_apps: ^2.2.0
  url_launcher: ^6.3.0

  # ── OAuth / Game APIs ─────────────────────────────────────────
  flutter_web_auth_2: ^4.0.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true